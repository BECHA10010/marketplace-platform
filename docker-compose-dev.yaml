# docker compose -f docker-compose-dev.yaml up -d --build
# docker compose -f docker-compose-dev.yaml down -v

services:
  
  catalog_db:
    container_name: catalog-db-dev
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456789
      - POSTGRES_DB=catalog-db
    restart: always
    ports:
      - "7101:5432"
    volumes:
      - postgres_catalog:/var/lib/postgresql/data/
  
  basket_db:
    container_name: basket-db-dev
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456789
      - POSTGRES_DB=basket-db
    restart: always
    ports:
      - "7102:5432"
    volumes:
      - postgres_basket:/var/lib/postgresql/data/

  basket_redis:
    container_name: basket-redis-dev
    image: redis
    command: redis-server --requirepass "123456789" --protected-mode no
    restart: always
    ports:
      - "7122:6379"
    volumes:
      - redis_basket:/data

  promotion_db:
    container_name: promotion-db-dev
    image: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=123456789
      - MYSQL_DATABASE=promotion-db
    restart: always
    ports:
      - "7103:3306"
    volumes:
      - mysql_promotion:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456789" ]
      interval: 5s
      timeout: 5s
      retries: 10

  promotion_api:
    container_name: promotion-api-dev
    build:
      context: .
      dockerfile: src/Services/Promotion/Promotion.Grpc/Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=0
    ports:
      - "7003:8080"
      - "7013:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      promotion_db:
        condition: service_healthy
    restart: unless-stopped

  checkout_db:
    container_name: checkout-db-dev
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456789
      - POSTGRES_DB=checkout-db
    restart: always
    ports:
      - "7104:5432"
    volumes:
      - postgres_checkout:/var/lib/postgresql/data/

  checkout_db_test:
    container_name: checkout-db-test
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456789
      - POSTGRES_DB=checkout-db-test
    restart: always
    ports:
      - "7204:5432"
    volumes:
      - postgres_checkout_test:/var/lib/postgresql/data/

volumes:
  postgres_catalog:
  postgres_basket:
  redis_basket:
  mysql_promotion:
  postgres_checkout:
  postgres_checkout_test: